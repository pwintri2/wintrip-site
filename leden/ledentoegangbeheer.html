<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ledentoegangbeheer | Wintrip</title>

  <link rel="stylesheet" href="/assets/style.css?v=2">
  <link rel="stylesheet" href="/leden/leden.css?v=1">
  <script defer src="/leden/leden.js?v=1"></script>
</head>
<body class="bg" data-page="toegang">
  <header class="topbar">
    <img src="/assets/logo.png" class="logo" alt="Wintrip logo">
    <div class="titleWrap">
      <div class="title">Ledentoegangbeheer</div>
      <div class="subtitle">Wie mag wat zien?</div>
    </div>

    <nav class="menu">
      <a class="menuBtn ghost" href="/dashboard.html">Dashboard</a>
    </nav>
  </header>

  <div class="loginbar" id="loginbar">
    <input id="pw" type="password" placeholder="Admin wachtwoord">
    <button id="loginBtn" class="btn primary">Inloggen</button>
    <span id="loginMsg"></span>
  </div>

  <main class="container">
    <div class="card">
      <div class="cardTitle">Toegang toevoegen / wijzigen</div>

      <label>Label (bijv. “Koorlid Jan”)</label>
      <input id="label" type="text" placeholder="Bijv. Koorlid Jan">

      <label>Toegangscode</label>
      <input id="code" type="text" placeholder="Bijv. 6-cijferig of een woord">

      <label style="display:flex; gap:10px; align-items:center; margin-top:10px;">
        <input id="leden_view" type="checkbox" checked>
        Ledenpagina bekijken (leden.html)
      </label>

      <label style="display:flex; gap:10px; align-items:center;">
        <input id="leden_manage" type="checkbox">
        Leden beheren (ledenbeheer.html)
      </label>

      <div class="modalBtns" style="justify-content:flex-end; margin-top:12px;">
        <button id="saveBtn" class="btn primary">Opslaan</button>
      </div>
    </div>

    <div style="height:14px"></div>

    <div class="tileGrid" id="wrap"></div>
  </main>
</body>
</html>
